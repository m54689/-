<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0a0a0a;--panel:#111111;--border:#222222;
    --green:#00ff88;--red:#ff3355;--yellow:#ffcc00;
    --text:#cccccc;--dim:#555555;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

  #lockScreen{background:var(--panel);border:1px solid var(--border);border-radius:4px;width:100%;max-width:320px;}
  .lock-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--dim);text-align:center;}
  .lock-body{padding:24px 20px;display:flex;flex-direction:column;gap:14px;align-items:center;}
  .lock-icon{font-size:32px;}
  #lockScreen input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 12px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:4px;text-align:center;outline:none;transition:border-color 0.2s;}
  #lockScreen input:focus{border-color:var(--green);}
  #lockScreen input.shake{animation:shake 0.3s;border-color:var(--red);}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .lock-err{font-size:11px;color:var(--red);min-height:16px;}
  .btn-unlock{width:100%;padding:12px;background:transparent;border:1px solid var(--green);border-radius:3px;color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;}
  .btn-unlock:hover{background:var(--green);color:var(--bg);}

  #mainPanel{display:none;width:100%;max-width:600px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);}
  .dot.green{background:var(--green);box-shadow:0 0 6px var(--green);}
  .dot.red{background:var(--red);}
  .dot.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow);}
  .panel-title{font-size:11px;color:var(--dim);margin-right:auto;}
  .icon-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:0 4px;font-family:'IBM Plex Mono',monospace;text-transform:none;letter-spacing:0;}
  .icon-btn:hover{color:var(--text);}
  .panel-body{padding:20px;display:flex;flex-direction:column;gap:14px;}

  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:4px;}
  .tab{padding:8px 16px;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;text-transform:uppercase;letter-spacing:1px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--green);border-bottom-color:var(--green);}
  .tab-content{display:none;}
  .tab-content.active{display:flex;flex-direction:column;gap:14px;}

  .field label{display:block;font-size:10px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
  .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 12px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
  .field input:focus,.field select:focus{border-color:var(--green);}
  .field select option{background:var(--panel);}
  .input-row{display:flex;gap:6px;}
  .input-row input{flex:1;}

  .saved-list{display:flex;flex-direction:column;gap:4px;}
  .saved-item{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:6px 10px;cursor:pointer;transition:border-color 0.15s;font-size:11px;}
  .saved-item:hover{border-color:var(--green);}
  .saved-item.active{border-color:var(--green);color:var(--green);}
  .saved-item-name{flex:1;}
  .saved-item-sub{font-size:10px;color:var(--dim);}
  .saved-item-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px;font-family:'IBM Plex Mono',monospace;text-transform:none;letter-spacing:0;}
  .saved-item-del:hover{color:var(--red);}
  .empty-list{font-size:11px;color:var(--dim);padding:6px 0;}

  .buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  button{padding:12px;border:1px solid var(--border);border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:1px;}
  .btn-start{background:transparent;color:var(--green);border-color:var(--green);}
  .btn-start:hover{background:var(--green);color:var(--bg);}
  .btn-stop{background:transparent;color:var(--red);border-color:var(--red);}
  .btn-stop:hover{background:var(--red);color:#fff;}
  .btn-status{background:transparent;color:var(--dim);border-color:var(--border);}
  .btn-status:hover{color:var(--text);border-color:var(--text);}
  .btn-logs{background:transparent;color:var(--yellow);border-color:var(--yellow);}
  .btn-logs:hover{background:var(--yellow);color:var(--bg);}
  .btn-save{background:transparent;color:var(--green);border-color:var(--green);font-size:11px;padding:8px 12px;}
  .btn-save:hover{background:var(--green);color:var(--bg);}

  .status-bar{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 12px;font-size:11px;color:var(--dim);min-height:40px;line-height:1.6;white-space:pre-wrap;}
  .status-bar.ok{color:var(--green);}
  .status-bar.err{color:var(--red);}
  .status-bar.info{color:var(--yellow);}

  .logs-panel{display:none;flex-direction:column;gap:8px;}
  .logs-panel.visible{display:flex;}
  .logs-header{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;}
  .logs-controls{display:flex;gap:8px;align-items:center;}
  .logs-refresh{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 6px;text-transform:none;letter-spacing:0;font-family:'IBM Plex Mono',monospace;}
  .logs-refresh:hover{color:var(--text);}
  .logs-box{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:12px;font-size:10px;height:300px;overflow-y:auto;line-height:1.7;color:var(--dim);white-space:pre-wrap;word-break:break-all;direction:ltr;text-align:left;}
  .logs-box::-webkit-scrollbar{width:4px;}
  .logs-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .log-line-out{color:#aaa;}
  .log-line-err{color:#ff8866;}
  .log-line-cmd{color:var(--yellow);}
  .log-line-ok{color:var(--green);}

  .section-sep{border:none;border-top:1px solid var(--border);margin:2px 0;}
  button:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-header">control panel v1</div>
  <div class="lock-body">
    <div class="lock-icon">🔒</div>
    <input type="password" id="passInput" placeholder="קוד גישה" maxlength="20" onkeydown="if(event.key==='Enter') unlock()"/>
    <div class="lock-err" id="lockErr"></div>
    <button class="btn-unlock" onclick="unlock()">כניסה</button>
  </div>
</div>

<div id="mainPanel">
  <div class="panel">
    <div class="panel-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot" id="statusDot"></div>
      <span class="panel-title">control panel v1</span>
      <button class="icon-btn" onclick="lockPanel()">🔒</button>
    </div>
    <div class="panel-body">

      <div class="tabs">
        <div class="tab active" onclick="switchTab('run')">▶ הרצה</div>
        <div class="tab" onclick="switchTab('tokens')">🔑 טוקנים</div>
        <div class="tab" onclick="switchTab('projects')">📁 פרויקטים</div>
      </div>

      <!-- TAB: הרצה -->
      <div class="tab-content active" id="tab-run">
        <div class="field">
          <label>טוקן פעיל</label>
          <select id="activeToken" onchange="onTokenChange()">
            <option value="">— בחר טוקן —</option>
          </select>
        </div>
        <div class="field">
          <label>פרויקט פעיל</label>
          <select id="activeRepo" onchange="onRepoChange()">
            <option value="">— בחר פרויקט —</option>
          </select>
        </div>
        <div id="crdFields">
          <div class="field" style="margin-bottom:14px">
            <label>סביבה</label>
            <select id="mode">
              <option value="desktop">desktop</option>
              <option value="android">android</option>
            </select>
          </div>
          <div class="field">
            <label>קוד חיבור (CRD)</label>
            <input type="text" id="crd_code" placeholder="הדבק את הקוד מגוגל..."/>
          </div>
        </div>
        <div class="buttons">
          <button class="btn-start" onclick="startRun()">▶ הפעל</button>
          <button class="btn-stop" onclick="stopRun()">■ עצור</button>
          <button class="btn-status" onclick="getStatus()">↻ סטטוס</button>
          <button class="btn-logs" onclick="toggleLogs()">📋 לוגים</button>
        </div>
        <div class="status-bar" id="log">ממתין לפעולה...</div>
        <div class="logs-panel" id="logsPanel">
          <div class="logs-header">
            <span>לוגים מלאים</span>
            <div class="logs-controls">
              <button class="logs-refresh" onclick="loadLogs()">↻ רענן</button>
            </div>
          </div>
          <div class="logs-box" id="logsBox">טוען...</div>
        </div>
      </div>

      <!-- TAB: טוקנים -->
      <div class="tab-content" id="tab-tokens">
        <div class="field">
          <label>הוסף טוקן חדש</label>
          <div class="input-row">
            <input type="text" id="tokenName" placeholder="שם (למשל: חשבון ראשי)"/>
            <input type="password" id="tokenValue" placeholder="ghp_..."/>
            <button class="btn-save" onclick="saveToken()">+ הוסף</button>
          </div>
        </div>
        <div class="saved-list" id="tokenList"></div>
      </div>

      <!-- TAB: פרויקטים -->
      <div class="tab-content" id="tab-projects">
        <div class="field">
          <label>הוסף פרויקט</label>
          <div class="input-row">
            <input type="text" id="repoName" placeholder="שם פרויקט"/>
            <input type="text" id="repoUrl" placeholder="https://github.com/user/repo/"/>
          </div>
          <div style="height:6px"></div>
          <div class="input-row">
            <input type="text" id="repoWorkflow" placeholder="שם קובץ yml (למשל: Start.yml)"/>
            <select id="repoType" style="max-width:150px">
              <option value="crd">CRD (עם קוד גוגל)</option>
              <option value="simple">פשוט (בלי inputs)</option>
            </select>
            <button class="btn-save" onclick="saveProject()">+ הוסף</button>
          </div>
        </div>
        <div class="saved-list" id="projectList"></div>
      </div>

    </div>
  </div>
</div>

<script>
const PASSWORD = "345148";
const ENC_KEY = "cp_" + btoa(PASSWORD);
let logsVisible = false;
let logsInterval = null;

function encrypt(text) {
  let r="";
  for(let i=0;i<text.length;i++) r+=String.fromCharCode(text.charCodeAt(i)^PASSWORD.charCodeAt(i%PASSWORD.length));
  return btoa(r);
}
function decrypt(enc) {
  try {
    const t=atob(enc); let r="";
    for(let i=0;i<t.length;i++) r+=String.fromCharCode(t.charCodeAt(i)^PASSWORD.charCodeAt(i%PASSWORD.length));
    return r;
  } catch{return "";}
}

// נעילה
window.onload=()=>{ if(localStorage.getItem('cp_unlocked')===ENC_KEY) showMain(); };

function unlock() {
  const val=document.getElementById('passInput').value;
  const inp=document.getElementById('passInput');
  if(val===PASSWORD) {
    localStorage.setItem('cp_unlocked',ENC_KEY);
    showMain();
  } else {
    document.getElementById('lockErr').textContent='קוד שגוי';
    inp.classList.add('shake'); inp.value='';
    setTimeout(()=>inp.classList.remove('shake'),400);
  }
}

function showMain() {
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainPanel').style.display='block';
  renderTokens(); renderProjects(); refreshDropdowns();
}

function lockPanel() {
  localStorage.removeItem('cp_unlocked');
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('mainPanel').style.display='none';
  document.getElementById('passInput').value='';
  document.getElementById('lockErr').textContent='';
}

// טאבים
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['run','tokens','projects'][i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// טוקנים
function getTokens() { try{return JSON.parse(localStorage.getItem('cp_tokens')||'[]');}catch{return[];} }
function setTokens(t) { localStorage.setItem('cp_tokens',JSON.stringify(t)); }

function saveToken() {
  const name=document.getElementById('tokenName').value.trim();
  const val=document.getElementById('tokenValue').value.trim();
  if(!name||!val){setLog('חסר שם או טוקן','err');return;}
  const tokens=getTokens();
  tokens.push({name,value:encrypt(val)});
  setTokens(tokens);
  document.getElementById('tokenName').value='';
  document.getElementById('tokenValue').value='';
  renderTokens(); refreshDropdowns();
  setLog('✓ טוקן נשמר','ok');
}

function deleteToken(i) {
  const tokens=getTokens(); tokens.splice(i,1); setTokens(tokens);
  renderTokens(); refreshDropdowns();
}

function renderTokens() {
  const tokens=getTokens();
  const list=document.getElementById('tokenList');
  if(!tokens.length){list.innerHTML='<div class="empty-list">אין טוקנים שמורים</div>';return;}
  list.innerHTML=tokens.map((t,i)=>`
    <div class="saved-item">
      <span class="saved-item-name">${t.name}</span>
      <span class="saved-item-sub">ghp_****</span>
      <button class="saved-item-del" onclick="deleteToken(${i})">✕</button>
    </div>
  `).join('');
}

// פרויקטים
function getProjects() { try{return JSON.parse(localStorage.getItem('cp_projects')||'[]');}catch{return[];} }
function setProjects(p) { localStorage.setItem('cp_projects',JSON.stringify(p)); }

function saveProject() {
  const name=document.getElementById('repoName').value.trim();
  const url=document.getElementById('repoUrl').value.trim();
  const workflow=document.getElementById('repoWorkflow').value.trim();
  const type=document.getElementById('repoType').value;
  if(!name||!url||!workflow){setLog('מלא את כל השדות','err');return;}
  let repo=url;
  const match=url.match(/github\.com\/([^\/]+\/[^\/]+)/);
  if(match) repo=match[1].replace(/\/$/,'');
  const projects=getProjects();
  projects.push({name,repo,workflow,type});
  setProjects(projects);
  document.getElementById('repoName').value='';
  document.getElementById('repoUrl').value='';
  document.getElementById('repoWorkflow').value='';
  renderProjects(); refreshDropdowns();
  setLog('✓ פרויקט נשמר','ok');
}

function deleteProject(i) {
  const p=getProjects(); p.splice(i,1); setProjects(p);
  renderProjects(); refreshDropdowns();
}

function renderProjects() {
  const projects=getProjects();
  const list=document.getElementById('projectList');
  if(!projects.length){list.innerHTML='<div class="empty-list">אין פרויקטים שמורים</div>';return;}
  list.innerHTML=projects.map((p,i)=>`
    <div class="saved-item">
      <span class="saved-item-name">${p.name}</span>
      <span class="saved-item-sub">${p.repo} · ${p.workflow} · ${p.type}</span>
      <button class="saved-item-del" onclick="deleteProject(${i})">✕</button>
    </div>
  `).join('');
}

function refreshDropdowns() {
  const tokens=getTokens();
  const projects=getProjects();
  const ts=document.getElementById('activeToken');
  const curT=ts.value;
  ts.innerHTML='<option value="">— בחר טוקן —</option>'+tokens.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('');
  if(curT) ts.value=curT;

  const rs=document.getElementById('activeRepo');
  const curR=rs.value;
  rs.innerHTML='<option value="">— בחר פרויקט —</option>'+projects.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');
  if(curR) rs.value=curR;
  onRepoChange();
}

function onTokenChange(){}

function onRepoChange() {
  const i=document.getElementById('activeRepo').value;
  const projects=getProjects();
  const p=projects[i];
  const crdFields=document.getElementById('crdFields');
  if(p&&p.type==='simple') crdFields.style.display='none';
  else crdFields.style.display='block';
}

function getActiveToken() {
  const i=document.getElementById('activeToken').value;
  if(i==='') return '';
  const tokens=getTokens();
  return tokens[i]?decrypt(tokens[i].value):'';
}

function getActiveProject() {
  const i=document.getElementById('activeRepo').value;
  if(i==='') return null;
  return getProjects()[i]||null;
}

function setLog(msg,type='') {
  const el=document.getElementById('log');
  el.textContent=msg; el.className='status-bar '+type;
}
function setDot(color) { document.getElementById('statusDot').className='dot '+color; }

async function startRun() {
  const token=getActiveToken();
  const project=getActiveProject();
  if(!token){setLog('בחר טוקן!','err');return;}
  if(!project){setLog('בחר פרויקט!','err');return;}
  setLog('מפעיל...','info'); setDot('yellow');

  let inputs={};
  if(project.type==='crd') {
    inputs={mode:document.getElementById('mode').value, crd_code:document.getElementById('crd_code').value.trim()};
  }

  try {
    const body={ref:'main'};
    if(Object.keys(inputs).length) body.inputs=inputs;
    const res=await fetch(`https://api.github.com/repos/${project.repo}/actions/workflows/${project.workflow}/dispatches`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.status===204){setLog('✓ הופעל! בדוק סטטוס בעוד כמה שניות.','ok');setDot('green');}
    else{const e=await res.json();setLog('שגיאה: '+(e.message||res.status),'err');setDot('red');}
  } catch(e){setLog('שגיאת רשת: '+e.message,'err');setDot('red');}
}

async function stopRun() {
  const token=getActiveToken(); const project=getActiveProject();
  if(!token){setLog('בחר טוקן!','err');return;}
  if(!project){setLog('בחר פרויקט!','err');return;}
  setLog('מחפש ריצה פעילה...','info');
  try {
    const res=await fetch(`https://api.github.com/repos/${project.repo}/actions/runs?status=in_progress`,{
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    const data=await res.json();
    if(!data.workflow_runs?.length){setLog('אין ריצה פעילה.','info');setDot('');return;}
    const runId=data.workflow_runs[0].id;
    const cancel=await fetch(`https://api.github.com/repos/${project.repo}/actions/runs/${runId}/cancel`,{
      method:'POST',headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    if(cancel.status===202){setLog(`✓ עצרתי ריצה #${runId}`,'ok');setDot('red');}
    else setLog('לא הצלחתי לעצור.','err');
  } catch(e){setLog('שגיאת רשת: '+e.message,'err');}
}

async function getStatus() {
  const token=getActiveToken(); const project=getActiveProject();
  if(!token){setLog('בחר טוקן!','err');return;}
  if(!project){setLog('בחר פרויקט!','err');return;}
  setLog('בודק...','info');
  try {
    const res=await fetch(`https://api.github.com/repos/${project.repo}/actions/runs?per_page=1`,{
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    const data=await res.json();
    if(!data.workflow_runs?.length){setLog('אין ריצות.','info');return;}
    const run=data.workflow_runs[0];
    const started=new Date(run.created_at).toLocaleString('he-IL');
    if(run.status==='in_progress'){
      setLog(`● פעיל\nהתחיל: ${started}\nID: ${run.id}`,'ok');setDot('green');
    } else {
      setLog(`○ לא פעיל\nסטטוס: ${run.status}\nתוצאה: ${run.conclusion||'-'}\nהתחיל: ${started}`,'info');setDot('');
    }
  } catch(e){setLog('שגיאת רשת: '+e.message,'err');}
}

async function toggleLogs() {
  logsVisible=!logsVisible;
  document.getElementById('logsPanel').className='logs-panel'+(logsVisible?' visible':'');
  if(logsVisible){await loadLogs();logsInterval=setInterval(loadLogs,10000);}
  else clearInterval(logsInterval);
}

async function loadLogs() {
  const token=getActiveToken(); const project=getActiveProject();
  const box=document.getElementById('logsBox');
  if(!token||!project){box.textContent='בחר טוקן ופרויקט.';return;}
  box.textContent='טוען לוגים...';
  try {
    // מצא ריצה אחרונה
    const runsRes=await fetch(`https://api.github.com/repos/${project.repo}/actions/runs?per_page=1`,{
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    const runsData=await runsRes.json();
    if(!runsData.workflow_runs?.length){box.textContent='אין ריצות.';return;}
    const run=runsData.workflow_runs[0];

    // מצא jobs
    const jobsRes=await fetch(`https://api.github.com/repos/${project.repo}/actions/runs/${run.id}/jobs`,{
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    const jobsData=await jobsRes.json();

    let fullLog=`══ Run #${run.id} ══ ${run.status.toUpperCase()} ══\n`;
    fullLog+=`Started: ${new Date(run.created_at).toLocaleString('he-IL')}\n`;
    fullLog+='═'.repeat(60)+'\n\n';

    for(const job of jobsData.jobs||[]) {
      fullLog+=`┌─ JOB: ${job.name} [${job.status}${job.conclusion?' → '+job.conclusion:''}]\n`;

      // נסה לטעון לוגים מלאים לכל job
      try {
        const logRes=await fetch(`https://api.github.com/repos/${project.repo}/actions/jobs/${job.id}/logs`,{
          headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
        });
        if(logRes.ok) {
          const logText=await logRes.text();
          // נקה timestamp prefix מכל שורה
          const cleaned=logText.split('\n').map(line=>{
            return line.replace(/^\d{4}-\d{2}-\d{2}T[\d:\.]+Z\s*/,'');
          }).join('\n');
          fullLog+=cleaned+'\n';
        } else {
          // fallback: רק steps
          for(const step of job.steps||[]) {
            const icon=step.conclusion==='success'?'✓':step.conclusion==='failure'?'✗':step.status==='in_progress'?'◉':'○';
            fullLog+=`  ${icon} ${step.name}\n`;
          }
        }
      } catch {
        for(const step of job.steps||[]) {
          const icon=step.conclusion==='success'?'✓':step.conclusion==='failure'?'✗':step.status==='in_progress'?'◉':'○';
          fullLog+=`  ${icon} ${step.name}\n`;
        }
      }
      fullLog+='└'+'─'.repeat(59)+'\n\n';
    }

    box.textContent=fullLog;
    box.scrollTop=box.scrollHeight;
  } catch(e){box.textContent='שגיאה: '+e.message;}
}
</script>
</body>
